<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP</title> 
 
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #1c856e;
        }

        /* Full screen center */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Image styling for wide logo */
        .container img {
            max-width: 90vw;   /* responsive width */
            max-height: 60vh;  /* keeps height balanced */
            width: auto;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="erp-logo.png" alt="ERP Logo">
    </div>

</body>
</html>
